apiVersion: apps/v1
kind: Deployment
metadata:
  name: micewriter-k8s-injector
  namespace: {{ .Release.Namespace }}
  labels:
    app: micewriter-k8s-injector
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: micewriter-k8s-injector
  template:
    metadata:
      labels:
        app: micewriter-k8s-injector
    spec:
      containers:
        - name: webhook
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --port=8443
            - --tls-cert=/tls/tls.crt
            - --tls-key=/tls/tls.key
          ports:
            - containerPort: 8443
              name: https
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 2
            periodSeconds: 5
          env:
            - name: ENGINE_IMAGE
              value: {{ .Values.engine.image | quote }}
            - name: MINIO_URL
              value: {{ .Values.engine.minioUrl | quote }}
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: micewriter-engine-credentials
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: micewriter-engine-credentials
                  key: MINIO_SECRET_KEY
            - name: MINIO_BUCKET
              value: {{ .Values.engine.minioBucket | quote }}
            - name: NESSIE_URI
              value: {{ .Values.engine.nessieUri | quote }}
            - name: NESSIE_WAREHOUSE
              value: {{ .Values.engine.nessieWarehouse | quote }}
            - name: ROCKSDB_STORAGE_CLASS
              value: {{ .Values.engine.rocksdbStorageClass | quote }}
            - name: ROCKSDB_STORAGE_SIZE
              value: {{ .Values.engine.rocksdbStorageSize | quote }}
            - name: ENGINE_CPU_REQUEST
              value: {{ .Values.engine.resources.requests.cpu | quote }}
            - name: ENGINE_MEM_REQUEST
              value: {{ .Values.engine.resources.requests.memory | quote }}
            - name: ENGINE_CPU_LIMIT
              value: {{ .Values.engine.resources.limits.cpu | quote }}
            - name: ENGINE_MEM_LIMIT
              value: {{ .Values.engine.resources.limits.memory | quote }}
            - name: ENABLE_MANUAL_FLUSH
              value: {{ .Values.engine.enableManualFlush | quote }}
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
