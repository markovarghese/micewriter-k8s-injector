apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: micewriter-webhook-cert
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.tls.secretName }}
  dnsNames:
    - micewriter-k8s-injector.{{ .Release.Namespace }}.svc
    - micewriter-k8s-injector.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: micewriter-selfsigned-issuer
    kind: Issuer
